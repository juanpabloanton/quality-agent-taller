spring:
  application:
    name: secretaria
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/secretaria}
    username: ${DB_USERNAME:secretaria}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  secretaria:
    password: ${APP_SECRETARIA_PASSWORD}

server:
  servlet:
    context-path: /api/v1
  error:
    include-stacktrace: never
